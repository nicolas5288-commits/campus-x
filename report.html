<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>提報計畫 · UniEmbassy</title>
  <meta name="description" content="看到新的校園大使計畫？花 30 秒提報給 UniEmbassy，通過上架後可獲得 +30 貢獻積分。" />
  <link rel="canonical" href="https://uniembassy.tw/report.html" />
  <link rel="stylesheet" href="styles.css?v=35" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#1a1a1a" />
</head>
<body>
  <header class="nav">
    <div class="wrap nav-inner">
      <a href="index.html" class="logo"><span class="dot"></span>UniEmbassy</a>
      <nav class="nav-links">
        <a href="index.html">找計畫</a>
        <a href="about.html">什麼是校園大使</a>
        <a href="network.html">人脈網</a>
        <a href="events.html">活動</a>
        <a href="#" class="btn ghost sm" id="loginBtn">登入 / 註冊</a>
      </nav>
    </div>
  </header>

  <div class="page">
    <a href="index.html" class="back-link">← 回首頁</a>
    <div class="page-head">
      <h1>🕵️ 提報一個計畫</h1>
      <p>在 IG、Dcard、學校公告看到新的校園大使計畫？丟給我們，審核上架後你可獲得 <b>+30 貢獻積分</b>。細節我們會幫忙補完，你只要提供基本資訊。</p>
    </div>

    <div id="formWrap" class="form-card" style="margin-top:24px;">
      <p class="auth-sub" style="margin-bottom:18px;">💡 提報前建議先<a href="index.html#programs">搜尋一下</a>，看看這個計畫是不是已經在站上了。</p>
      <form id="reportForm">
        <div class="field"><label><span>品牌 / 單位名稱 <span class="hint">必填</span></span>
          <input type="text" name="brand" required placeholder="例：foodpanda、KKBOX、學生會…" /></label></div>
        <div class="field"><label><span>計畫名稱 <span class="hint">選填，不填就用品牌名</span></span>
          <input type="text" name="title" placeholder="例：第 5 屆 foodpanda 校園大使招募" /></label></div>
        <div class="field"><label><span>在哪看到的？來源連結 <span class="hint">必填</span></span>
          <input type="url" name="sourceUrl" required placeholder="IG 貼文 / 官網 / Dcard 連結" /></label></div>
        <div class="field"><label><span>補充說明 <span class="hint">選填，你知道的都寫</span></span>
          <textarea name="note" placeholder="例：報名到 8/31、有結業獎金、限大專院校在學生…"></textarea></label></div>
        <div class="auth-err" id="reportErr"></div>
        <button type="submit" class="btn" id="reportSubmit" style="width:100%;justify-content:center;">送出提報</button>
      </form>
    </div>

    <div id="successWrap" class="form-card" style="display:none;margin-top:24px;">
      <div class="success-box">
        <div class="big">🎉</div>
        <h2>提報成功，感謝你！</h2>
        <p>我們會審核並補完資料，通過上架後你就會獲得 <b>+30 貢獻積分</b>。</p>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
          <a href="network.html#leaderboard" class="btn">看貢獻排行榜</a>
          <button class="btn ghost" id="againBtn">再提報一個</button>
        </div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js?v=35"></script>
  <script src="data.js?v=35"></script>
  <script src="db.js?v=35"></script>
  <script src="authui.js?v=35"></script>
  <script src="report.js?v=35"></script>
  <script src="nav.js?v=35"></script>
  <script src="install.js?v=35"></script>
</body>
</html>
