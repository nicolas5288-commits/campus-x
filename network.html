<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大使人脈網 · Campus X</title>
  <meta name="description" content="校園大使人脈網——建立你的大使名片，找到同校、同計畫的夥伴。" />
  <link rel="canonical" href="https://nicolas5288-commits.github.io/campus-x/network.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Campus X" />
  <meta property="og:title" content="大使人脈網 · Campus X" />
  <meta property="og:description" content="建立你的大使名片，找到同校、同計畫的夥伴。" />
  <meta property="og:url" content="https://nicolas5288-commits.github.io/campus-x/network.html" />
  <meta property="og:image" content="https://nicolas5288-commits.github.io/campus-x/og-image.png?v=1" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="zh_TW" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://nicolas5288-commits.github.io/campus-x/og-image.png?v=1" />
  <link rel="stylesheet" href="styles.css?v=21k" />
</head>
<body>
  <header class="nav">
    <div class="wrap nav-inner">
      <a href="index.html" class="logo"><span class="dot"></span>Campus X</a>
      <nav class="nav-links">
        <a href="index.html">找計畫</a>
        <a href="about.html">什麼是校園大使</a>
        <a href="network.html">人脈網</a>
        <a href="events.html">活動</a>
        <a href="#" class="btn ghost sm" id="loginBtn">登入 / 註冊</a>
      </nav>
    </div>
  </header>

  <div class="page" style="max-width:1120px;">
    <div class="net-intro">
      <div>
        <h2>🕸️ 大使人脈網</h2>
        <p>做過或正在做校園大使的人都在這。找同校前輩問攻略、跨校認識夥伴，建一張名片讓別人找到你。<br><b style="color:#fff;">🏆 前 20 位建名片的大使，獲得限定「創始大使」徽章。</b></p>
      </div>
      <button class="btn" id="createProfileBtn">＋ 建立我的名片</button>
    </div>

    <div class="filters">
      <div class="filter-row">
        <div class="select-box"><select id="schoolSel"></select></div>
        <div class="select-box"><select id="skillSel"></select></div>
        <div class="search-box">🔍 <input type="text" id="netSearch" placeholder="搜尋名字、學校、專長…" /></div>
      </div>
    </div>
    <div class="sub" id="netCount" style="color:var(--ink-soft);font-size:14.5px;margin-bottom:18px;"></div>

    <div class="profile-grid" id="profileGrid"></div>
    <div class="admin-empty" id="netEmpty" style="display:none;">找不到符合的大使，換個條件試試 🔍</div>
  </div>

  <!-- 名片詳情 modal -->
  <div class="modal-mask" id="pmMask"><div class="modal" id="pmBody"></div></div>

  <!-- 建立/編輯名片 modal -->
  <div class="modal-mask" id="editMask">
    <div class="modal" id="editBody">
      <button class="modal-close" id="editClose">✕</button>
      <h2 id="editTitle">建立我的名片</h2>
      <p class="auth-sub">填好送出後由 Campus X 審核，通過就會出現在人脈網。</p>
      <form id="profileForm" style="margin-top:16px;">
        <div class="form-row">
          <div class="field"><label><span>暱稱 <span class="hint">必填</span></span><input type="text" name="nickname" required placeholder="想被叫什麼" /></label></div>
          <div class="field"><span>頭像</span>
            <div class="avatar-upload">
              <div class="avatar-preview" id="avatarPreview">🦊</div>
              <div>
                <label class="btn ghost sm" style="cursor:pointer;">
                  上傳照片<input type="file" id="avatarFile" accept="image/*" hidden />
                </label>
                <button type="button" class="btn ghost sm" id="avatarClear" style="display:none;">改用表情</button>
                <div class="hint" style="margin-top:6px;">照片會自動壓縮；不傳就用下面的表情符號</div>
              </div>
            </div>
            <div class="emoji-picker" id="avatarPicker" style="margin-top:10px;"></div>
          </div>
        </div>
        <div class="form-row">
          <div class="field"><label><span>學校</span>
            <input type="text" name="school" list="schoolList" placeholder="打字搜尋，或直接輸入" autocomplete="off" />
            <datalist id="schoolList"></datalist></label></div>
          <div class="field"><label><span>年級</span>
            <select name="grade">
              <option value="">請選擇</option>
              <option>大一</option><option>大二</option><option>大三</option><option>大四</option>
              <option>碩士</option><option>博士</option><option>應屆畢業</option><option>其他</option>
            </select></label></div>
        </div>
        <div class="field"><label><span>一句話介紹自己 <span class="hint">必填</span></span><input type="text" name="headline" required placeholder="例：做過 3 個計畫，最愛聊社群經營" /></label></div>
        <div class="field">
          <span>專長 <span class="hint">點選你的專長，可多選</span></span>
          <div class="chip-select" id="skillChips"></div>
        </div>
        <div class="field"><label><span>做過的計畫 <span class="hint">一行一個，格式：計畫名 / 第X屆 / 年份</span></span>
          <textarea name="experiences" placeholder="JLab 校園大使 / 第 1 屆 / 2025&#10;foodpanda 校園大使 / 第 3 屆 / 2024"></textarea></label></div>
        <div class="field"><label><span>IG 連結 <span class="hint">選填，開放聯繫才會顯示</span></span><input type="url" name="igUrl" placeholder="https://instagram.com/你的帳號" /></label></div>
        <label class="check-line" style="margin:4px 0 16px;"><input type="checkbox" name="contactOpen" checked /> 開放讓別人透過 IG 聯繫我</label>
        <div class="auth-err" id="editErr"></div>
        <button type="submit" class="btn" id="editSubmit" style="width:100%;justify-content:center;">送出審核</button>
      </form>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js?v=21k"></script>
  <script src="data.js?v=21k"></script>
  <script src="db.js?v=21k"></script>
  <script src="authui.js?v=21k"></script>
  <script src="network.js?v=21k"></script>
</body>
</html>
