<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的收藏 · UniEmbassy</title>
  <link rel="stylesheet" href="styles.css?v=37" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#1a1a1a" />
</head>
<body>
  <header class="nav">
    <div class="wrap nav-inner">
      <a href="index.html" class="logo"><span class="dot"></span>UniEmbassy</a>
      <nav class="nav-links">
        <a href="index.html">找計畫</a>
        <a href="about.html">什麼是校園大使</a>
        <a href="network.html">人脈網</a>
        <a href="events.html">活動</a>
        <a href="#" class="btn ghost sm" id="loginBtn">登入 / 註冊</a>
      </nav>
    </div>
  </header>

  <div class="page" style="max-width:1120px;">
    <div class="page-head">
      <h1>⭐ 我的收藏</h1>
      <p>你收藏的校園大使計畫都在這。登入後跨裝置同步。</p>
    </div>

    <!-- 未登入 -->
    <div id="needLogin" class="admin-gate" style="display:none;">
      <p style="color:var(--ink-soft);margin-bottom:18px;">登入後就能看到你收藏的計畫。</p>
      <button class="btn" id="loginCta">使用 Google 登入</button>
    </div>

    <div id="memberWrap" style="display:none;">
      <!-- 我的積分 -->
      <div class="score-card" id="scoreCard" style="display:none;"></div>

      <!-- 個人檔案 -->
      <div class="form-card" style="margin-bottom:30px;">
        <h2 style="font-size:20px;margin-bottom:4px;">👤 個人檔案</h2>
        <p class="auth-sub" style="margin-bottom:18px;">設定你的暱稱和頭貼，會顯示在右上角、心得、活動報名。</p>
        <div class="avatar-upload" style="margin-bottom:18px;">
          <div class="avatar-preview" id="accAvatarPreview">🙂</div>
          <div>
            <label class="btn ghost sm" style="cursor:pointer;">上傳頭貼<input type="file" id="accAvatarFile" accept="image/*" hidden /></label>
            <button type="button" class="btn ghost sm" id="accAvatarClear" style="display:none;">移除照片</button>
            <div class="hint" style="margin-top:6px;">照片會自動壓縮</div>
          </div>
        </div>
        <div class="field"><label><span>暱稱</span><input type="text" id="accNickname" maxlength="20" placeholder="給自己取個名字（1-20 字）" /></label></div>
        <button class="btn" id="accSave" style="width:100%;justify-content:center;">儲存個人檔案</button>
      </div>

      <!-- 我的收藏 -->
      <h2 style="font-size:20px;margin-bottom:4px;">⭐ 我的收藏</h2>
      <div class="sub" id="favCount" style="color:var(--ink-soft);font-size:14.5px;margin:4px 0 18px;"></div>
      <div class="grid" id="favGrid"></div>
      <div class="admin-empty" id="favEmpty" style="display:none;">還沒有收藏任何計畫。<a href="index.html">去逛逛計畫 →</a></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js?v=37"></script>
  <script src="data.js?v=37"></script>
  <script src="db.js?v=37"></script>
  <script src="authui.js?v=37"></script>
  <script src="member.js?v=37"></script>
  <script src="nav.js?v=37"></script>
  <script src="install.js?v=37"></script>
</body>
</html>
