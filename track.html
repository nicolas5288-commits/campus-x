<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>查詢投稿進度 · Campus X</title>
  <link rel="stylesheet" href="styles.css?v=21k" />
</head>
<body>
  <header class="nav">
    <div class="wrap nav-inner">
      <a href="index.html" class="logo"><span class="dot"></span>Campus X</a>
      <nav class="nav-links">
        <a href="index.html">找計畫</a>
        <a href="submit.html">我要投稿</a>
      </nav>
    </div>
  </header>

  <div class="page">
    <a href="index.html" class="back-link">← 回首頁</a>
    <div class="page-head">
      <h1>查詢投稿進度</h1>
      <p>輸入投稿完成時取得的「查稿編號」，就能查看審核狀態。</p>
    </div>

    <div class="form-card" style="margin-top:24px;">
      <div class="field">
        <label><span>查稿編號</span>
          <input type="text" id="trackCode" placeholder="例：u-1784557110218" /></label>
      </div>
      <button class="btn" id="trackBtn" style="width:100%;justify-content:center;">查詢</button>
      <div id="trackNote" class="auth-note" style="margin-top:12px;"></div>
    </div>

    <div id="trackResult" style="margin-top:18px;"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js?v=21k"></script>
  <script src="data.js?v=21k"></script>
  <script src="db.js?v=21k"></script>
  <script>
  (function () {
    const DB = window.DB;
    if (DB.MODE === "local") {
      document.getElementById("trackNote").textContent = "目前為展示模式：只查得到「這台瀏覽器」投稿的計畫。";
    }
    function esc(s) { return (s == null ? "" : String(s)).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

    const STATUS_VIEW = {
      pending:  { icon: "🕐", label: "審核中",   note: "已收到投稿，Campus X 審核中，通過後會自動上架。", cls: "" },
      live:     { icon: "✅", label: "已上架",   note: "恭喜！你的計畫已上架，學生可以在計畫列表看到並報名。", cls: "ok" },
      rejected: { icon: "❌", label: "已退回",   note: "很抱歉，這次投稿未通過審核。可依原因調整後重新投稿。", cls: "err" },
      closed:   { icon: "📁", label: "已截止",   note: "此計畫已過截止日或已下架。歡迎再次投稿新一期計畫。", cls: "" },
    };

    async function doTrack() {
      const code = document.getElementById("trackCode").value.trim();
      const box = document.getElementById("trackResult");
      if (!code) { box.innerHTML = '<div class="form-msg err">請先輸入查稿編號</div>'; return; }
      box.innerHTML = '<div class="admin-empty">查詢中…</div>';
      try {
        const r = await DB.getProgramStatus(code);
        if (!r.found) {
          box.innerHTML = '<div class="form-msg err">查無此編號，請確認是否輸入完整（含開頭英文與連字號）。</div>';
          return;
        }
        const v = STATUS_VIEW[r.status] || STATUS_VIEW.pending;
        box.innerHTML = `
          <div class="queue-card">
            <div style="display:flex;gap:14px;align-items:center;">
              <div style="font-size:38px;">${v.icon}</div>
              <div style="flex:1;">
                <h3>${esc(r.title)}</h3>
                <div class="q-brand">${esc(r.brand)}</div>
              </div>
              <span class="tag ${r.status === "live" ? "paid" : r.status === "rejected" ? "unpaid" : ""}" style="font-size:14px;padding:6px 14px;">${v.label}</span>
            </div>
            <div class="q-section" style="margin-top:14px;">${v.note}</div>
            ${r.status === "rejected" && r.reject_reason ? `<div class="q-section"><b>退回原因</b><div>${esc(r.reject_reason)}</div></div>` : ""}
            ${r.status === "rejected" ? `<div class="q-actions"><a class="btn" href="submit.html">調整後重新投稿</a></div>` : ""}
          </div>`;
      } catch (err) {
        box.innerHTML = `<div class="form-msg err">查詢失敗：${esc(err.message || "請稍後再試")}</div>`;
      }
    }
    document.getElementById("trackBtn").onclick = doTrack;
    document.getElementById("trackCode").addEventListener("keydown", (e) => { if (e.key === "Enter") doTrack(); });

    // 支援 ?code=xxx 直接帶入查詢（投稿成功頁的連結會用到）
    const urlCode = new URLSearchParams(location.search).get("code");
    if (urlCode) { document.getElementById("trackCode").value = urlCode; doTrack(); }
  })();
  </script>
</body>
</html>
