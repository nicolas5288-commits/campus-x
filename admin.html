<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>審核後台 · UniEmbassy</title>
  <link rel="stylesheet" href="styles.css?v=25" />
</head>
<body>
  <header class="nav">
    <div class="wrap nav-inner">
      <a href="index.html" class="logo"><span class="dot"></span>UniEmbassy</a>
      <nav class="nav-links">
        <a href="index.html">找計畫</a>
        <a href="submit.html">投稿</a>
      </nav>
    </div>
  </header>

  <div class="page admin-page">
    <div class="page-head">
      <h1>審核後台</h1>
      <p>審核廠商投稿的計畫，以及學長姐分享的心得。通過就會上架，退回可附原因。</p>
    </div>

    <!-- 未登入 / 非管理員時 -->
    <div id="gate" class="admin-gate" style="display:none;">
      <p style="color:var(--ink-soft);margin-bottom:18px;" id="gateMsg">請以管理員帳號登入後台。</p>
      <div id="gateForm" style="max-width:340px;margin:0 auto;text-align:left;">
        <button type="button" class="btn google-btn" id="adGoogleBtn" style="margin-bottom:16px;">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.5 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.5 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.3-2.1 14-5.6l-6.5-5.3C29.5 34.5 26.9 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.6 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.5 5.3C41.4 36.4 44 30.7 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
          用 Google 登入
        </button>
        <div class="auth-divider"><span>或用 Email</span></div>
        <div class="field"><label><span>管理員 Email</span><input type="email" id="adEmail" placeholder="you@example.com" /></label></div>
        <div class="field"><label><span>密碼</span><input type="password" id="adPw" placeholder="密碼" /></label></div>
        <div class="auth-err" id="adErr" style="margin-bottom:10px;"></div>
        <button class="btn" id="adLoginBtn" style="width:100%;justify-content:center;">登入</button>
      </div>
    </div>

    <!-- 後台主體 -->
    <div id="panel" style="display:none;">
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="stats">數據總覽</button>
        <button class="admin-tab" data-tab="programs">廠商投稿 <span class="badge" id="badgeP" style="display:none;">0</span></button>
        <button class="admin-tab" data-tab="reviews">學生心得 <span class="badge" id="badgeR" style="display:none;">0</span></button>
        <button class="admin-tab" data-tab="profiles">大使名片 <span class="badge" id="badgeN" style="display:none;">0</span></button>
        <button class="admin-tab" data-tab="events">活動 <span class="badge" id="badgeE" style="display:none;">0</span></button>
        <button class="admin-tab" data-tab="notes">計畫回報 <span class="badge" id="badgeNote" style="display:none;">0</span></button>
        <button class="admin-tab" data-tab="wishes">許願池</button>
        <button class="btn ghost sm" id="adLogout" style="margin-left:auto;">登出</button>
      </div>
      <div id="queue"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js?v=25"></script>
  <script src="data.js?v=25"></script>
  <script src="db.js?v=25"></script>
  <script>
  (function () {
    const DB = window.DB;
    let tab = "stats";
    let profileView = "pending";   // 大使名片 tab 內：pending / live / report

    function toast(msg) {
      const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2200);
    }
    function esc(s) { return (s == null ? "" : String(s)).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
    function stars(n) { n = n || 0; return "★".repeat(n) + "☆".repeat(5 - n); }

    // ---- 畫面切換 ----
    function showGate(msg) {
      document.getElementById("gate").style.display = "block";
      document.getElementById("panel").style.display = "none";
      if (msg) document.getElementById("gateMsg").textContent = msg;
    }
    function showPanel() {
      document.getElementById("gate").style.display = "none";
      document.getElementById("panel").style.display = "block";
      loadQueue();
    }

    // ---- 投稿佇列 ----
    function programCard(p) {
      return `<div class="queue-card" data-id="${p.id}">
        <div style="display:flex;gap:12px;align-items:start;">
          <div class="card-emoji">${p.emoji || "📌"}</div>
          <div style="flex:1;">
            <h3>${esc(p.title)}</h3>
            <div class="q-brand">${esc(p.brand)}</div>
          </div>
        </div>
        <div class="q-meta">
          <span class="tag ${p.paid ? "paid" : "unpaid"}">${p.paid ? "有薪" : "無薪"}</span>
          <span class="tag">${esc(p.category)}</span>
          <span class="tag">${esc(p.location)}</span>
          ${p.deadline ? `<span class="tag">截止 ${esc(p.deadline)}</span>` : ""}
        </div>
        <div class="q-section"><b>簡介</b><div>${esc(p.summary)}</div></div>
        ${p.tasks && p.tasks.length ? `<div class="q-section"><b>任務</b><div>${p.tasks.map(esc).join("、")}</div></div>` : ""}
        ${p.benefits && p.benefits.length ? `<div class="q-section"><b>福利</b><div>${p.benefits.map(esc).join("、")}</div></div>` : ""}
        <div class="q-section"><b>報名連結</b><div><a href="${esc(p.applyUrl)}" target="_blank" rel="noopener">${esc(p.applyUrl)}</a></div></div>
        <div class="q-actions">
          <button class="btn approve" data-approve="${p.id}">✓ 通過上架</button>
          <button class="btn reject" data-reject="${p.id}">✕ 退回</button>
        </div>
      </div>`;
    }

    // ---- 心得佇列 ----
    function reviewCard(r) {
      const typeLabel = r.type === "interview" ? "面試經驗" : "參與心得";
      const prog = r.programs ? `${esc(r.programs.title)}` : r.program_id;
      const rows = r.type === "interview"
        ? [["面試流程", r.process], ["被問了什麼", r.questions], ["準備建議", r.tips], ["結果", r.result]]
        : [["實際任務量", r.workload], ["收穫", r.gains], ["給學弟妹的建議", r.advice]];
      const body = rows.filter(([, v]) => v).map(([k, v]) =>
        `<div class="q-section"><b>${k}</b><div>${esc(v)}</div></div>`).join("");
      return `<div class="queue-card" data-id="${r.id}">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <span class="rev-type-badge">${typeLabel}</span>
          <span class="stars">${stars(r.rating)}</span>
          ${r.anonymous ? '<span class="tag">匿名</span>' : ""}
        </div>
        <div class="q-brand" style="margin-top:8px;">計畫：${prog}</div>
        ${body}
        ${r.extra ? `<div class="q-section"><b>補充</b><div>${esc(r.extra)}</div></div>` : ""}
        <div class="q-actions">
          <button class="btn approve" data-rapprove="${r.id}">✓ 通過上架</button>
          <button class="btn reject" data-rreject="${r.id}">✕ 退回</button>
        </div>
      </div>`;
    }

    async function loadQueue() {
      const queue = document.getElementById("queue");
      queue.innerHTML = '<div class="admin-empty">載入中…</div>';
      try {
        if (tab === "stats") {
          await renderStats();
        } else if (tab === "programs") {
          const list = await DB.getPendingPrograms();
          updateBadge("badgeP", list.length);
          queue.innerHTML = list.length
            ? list.map(programCard).join("")
            : '<div class="admin-empty">目前沒有待審的投稿 🎉</div>';
          bindProgramActions();
        } else if (tab === "reviews") {
          const list = await DB.getPendingReviews();
          updateBadge("badgeR", list.length);
          queue.innerHTML = list.length
            ? list.map(reviewCard).join("")
            : '<div class="admin-empty">目前沒有待審的心得 🎉</div>';
          bindReviewActions();
        } else if (tab === "profiles") {
          await renderProfilesTab();
        } else if (tab === "wishes") {
          await renderWishes();
        } else if (tab === "events") {
          const list = await DB.getPendingEvents();
          updateBadge("badgeE", list.length);
          queue.innerHTML = list.length
            ? list.map(eventCard).join("")
            : '<div class="admin-empty">目前沒有待審的活動 🎉</div>';
          bindEventActions();
        } else if (tab === "notes") {
          const list = await DB.getPendingNotes();
          updateBadge("badgeNote", list.length);
          queue.innerHTML = list.length
            ? list.map(noteCard).join("")
            : '<div class="admin-empty">目前沒有待處理的計畫回報 🎉</div>';
          bindNoteActions();
        }
      } catch (err) {
        queue.innerHTML = `<div class="admin-empty">載入失敗：${esc(err.message)}</div>`;
      }
      refreshBadges();
    }

    function updateBadge(id, n) {
      const b = document.getElementById(id);
      b.textContent = n; b.style.display = n > 0 ? "inline-block" : "none";
    }
    async function refreshBadges() {
      try { updateBadge("badgeP", (await DB.getPendingPrograms()).length); } catch {}
      try { updateBadge("badgeR", (await DB.getPendingReviews()).length); } catch {}
      try {
        const [pp, rr] = await Promise.all([DB.getPendingProfiles(), DB.getPendingReports().catch(() => [])]);
        updateBadge("badgeN", pp.length + rr.length);
      } catch {}
      try { updateBadge("badgeE", (await DB.getPendingEvents()).length); } catch {}
      try { updateBadge("badgeNote", (await DB.getPendingNotes()).length); } catch {}
    }

    // ---- 計畫回報卡 ----
    function noteCard(n) {
      const prog = n.programs ? `${esc(n.programs.brand)}｜${esc(n.programs.title)}` : n.program_id;
      return `<div class="queue-card" data-id="${n.id}">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <span class="rev-type-badge">${esc(n.type)}</span>
        </div>
        <div class="q-brand" style="margin-top:8px;">計畫：${prog}</div>
        <div class="q-section"><b>回報內容</b><div>${esc(n.content)}</div></div>
        <div class="q-actions">
          <button class="btn approve" data-editnote="${esc(n.program_id)}">✏️ 編輯此計畫</button>
          <button class="btn" data-noteok="${n.id}" style="background:#0f8a5f;color:#fff;">✓ 已處理</button>
          <button class="btn reject" data-notereject="${n.id}">✕ 退回</button>
        </div>
      </div>`;
    }
    function bindNoteActions() {
      document.querySelectorAll("[data-editnote]").forEach(b => b.onclick = () => {
        // 帶去前台該計畫的編輯（管理員登入態同一 session）
        location.href = "index.html?p=" + encodeURIComponent(b.dataset.editnote) + "&edit=1";
      });
      document.querySelectorAll("[data-noteok]").forEach(b => b.onclick = async () => {
        b.disabled = true; await DB.resolveNote(b.dataset.noteok, "accepted"); toast("已標記為處理完成 ✓"); loadQueue();
      });
      document.querySelectorAll("[data-notereject]").forEach(b => b.onclick = async () => {
        b.disabled = true; await DB.resolveNote(b.dataset.notereject, "rejected"); toast("已退回"); loadQueue();
      });
    }

    // ---- 數據總覽 ----
    async function renderStats() {
      const queue = document.getElementById("queue");
      queue.innerHTML = '<div class="admin-empty">載入中…</div>';
      let s = {}, wishes = [];
      try { s = await DB.getAdminStats() || {}; } catch (e) { queue.innerHTML = `<div class="admin-empty">數據載入失敗：${esc(e.message)}</div>`; return; }
      try { wishes = await DB.getBrandWishes() || []; } catch {}
      const tile = (label, val, hint) => `<div class="stat-tile"><b>${val ?? "—"}</b><span>${label}</span>${hint ? `<small>${hint}</small>` : ""}</div>`;
      const wishRows = wishes.length
        ? wishes.slice(0, 15).map((w, i) => `<tr><td>${i + 1}</td><td>${esc(w.brand_name)}</td><td><b>${w.votes}</b> 票</td></tr>`).join("")
        : `<tr><td colspan="3" style="color:var(--ink-soft);text-align:center;padding:20px;">還沒有人許願</td></tr>`;
      queue.innerHTML = `
        <div class="stat-grid four">
          ${tile("註冊人數", s.users)}
          ${tile("計畫上架中", s.programs_live)}
          ${tile("收藏總數", s.favorites)}
          ${tile("大使名片", s.profiles_live)}
        </div>
        <h3 style="margin:28px 0 12px;">🪄 廠商許願排行（開發名單）</h3>
        <div class="queue-card" style="padding:0;overflow:hidden;">
          <table class="cmp-table" style="min-width:auto;">
            <tr><th style="width:48px;">#</th><th>品牌</th><th style="width:90px;">票數</th></tr>
            ${wishRows}
          </table>
        </div>`;
      refreshBadges();
    }

    // ---- 名片卡 ----
    function profileCard(p) {
      const avatarHtml = p.avatar_url
        ? `<img src="${esc(p.avatar_url)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`
        : (p.avatar || "👤");
      return `<div class="queue-card" data-id="${p.id}">
        <div style="display:flex;gap:12px;align-items:center;">
          <div class="pc-avatar" style="overflow:hidden;">${avatarHtml}</div>
          <div style="flex:1;"><h3>${esc(p.nickname)}</h3><div class="q-brand">${esc(p.school || "")} ${esc(p.grade || "")}</div></div>
        </div>
        <div class="q-section"><b>介紹</b><div>${esc(p.headline || "")}</div></div>
        ${(p.skills && p.skills.length) ? `<div class="q-section"><b>專長</b><div>${p.skills.map(esc).join("、")}</div></div>` : ""}
        ${(p.experiences && p.experiences.length) ? `<div class="q-section"><b>經歷</b><div>${p.experiences.map(e => esc(e.programName) + (e.cohort ? "（" + esc(e.cohort) + "）" : "")).join("、")}</div></div>` : ""}
        <div class="q-section"><b>IG</b><div>${p.igUrl ? esc(p.igUrl) + (p.contactOpen ? "（開放聯繫）" : "（未開放）") : "未填"}</div></div>
        <div class="q-actions">
          <button class="btn approve" data-napprove="${p.id}">✓ 通過上架</button>
          <button class="btn reject" data-nreject="${p.id}">✕ 退回</button>
        </div>
      </div>`;
    }
    function bindProfileActions() {
      document.querySelectorAll("[data-napprove]").forEach(b => b.onclick = async () => {
        b.disabled = true; await DB.approveProfile(b.dataset.napprove); toast("名片已通過 ✓"); loadQueue();
      });
      document.querySelectorAll("[data-nreject]").forEach(b => b.onclick = async () => {
        if (!confirm("確定退回這張名片？")) return;
        b.disabled = true; await DB.rejectProfile(b.dataset.nreject); toast("已退回"); loadQueue();
      });
    }

    // ---- 大使名片 tab：三檢視（待審核 / 已上架 / 檢舉）----
    async function renderProfilesTab() {
      const queue = document.getElementById("queue");
      let pendingN = 0, reportN = 0;
      try { pendingN = (await DB.getPendingProfiles()).length; } catch {}
      try { reportN = (await DB.getPendingReports()).length; } catch {}
      updateBadge("badgeN", pendingN + reportN);
      const subBadge = (n) => n > 0 ? `<span class="badge">${n}</span>` : "";
      queue.innerHTML = `
        <div class="sub-tabs">
          <button class="sub-tab ${profileView === "pending" ? "active" : ""}" data-pv="pending">待審核 ${subBadge(pendingN)}</button>
          <button class="sub-tab ${profileView === "live" ? "active" : ""}" data-pv="live">已上架</button>
          <button class="sub-tab ${profileView === "report" ? "active" : ""}" data-pv="report">檢舉 ${subBadge(reportN)}</button>
        </div>
        <div id="profSub"><div class="admin-empty">載入中…</div></div>`;
      queue.querySelectorAll("[data-pv]").forEach(b => b.onclick = () => { profileView = b.dataset.pv; renderProfilesTab(); });
      const sub = document.getElementById("profSub");
      try {
        if (profileView === "pending") {
          const list = await DB.getPendingProfiles();
          sub.innerHTML = list.length ? list.map(profileCard).join("") : '<div class="admin-empty">目前沒有待審的名片 🎉</div>';
          bindProfileActions();
        } else if (profileView === "live") {
          const list = await DB.getLiveProfilesAdmin();
          sub.innerHTML = list.length ? list.map(liveProfileCard).join("") : '<div class="admin-empty">目前沒有已上架的名片</div>';
          bindLiveProfileActions();
        } else {
          const list = await DB.getPendingReports();
          sub.innerHTML = list.length ? list.map(reportCard).join("") : '<div class="admin-empty">目前沒有待處理的檢舉 🎉</div>';
          bindReportActions();
        }
      } catch (err) { sub.innerHTML = `<div class="admin-empty">載入失敗：${esc(err.message)}</div>`; }
    }
    function liveProfileCard(p) {
      const avatarHtml = p.avatar_url
        ? `<img src="${esc(p.avatar_url)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`
        : (p.avatar || "👤");
      return `<div class="queue-card" data-id="${p.id}">
        <div style="display:flex;gap:12px;align-items:center;">
          <div class="pc-avatar" style="overflow:hidden;">${avatarHtml}</div>
          <div style="flex:1;"><h3>${esc(p.nickname)}</h3><div class="q-brand">${esc(p.school || "")} ${esc(p.grade || "")}</div></div>
        </div>
        <div class="q-section"><b>介紹</b><div>${esc(p.headline || "")}</div></div>
        ${(p.skills && p.skills.length) ? `<div class="q-section"><b>專長</b><div>${p.skills.map(esc).join("、")}</div></div>` : ""}
        <div class="q-actions">
          <button class="btn reject" data-remove="${p.id}">⬇️ 下架這張名片</button>
        </div>
      </div>`;
    }
    function bindLiveProfileActions() {
      document.querySelectorAll("[data-remove]").forEach(b => b.onclick = async () => {
        if (!confirm("確定下架這張名片？資料會保留、之後可救回，名片牆會立即看不到。")) return;
        b.disabled = true; await DB.removeProfile(b.dataset.remove); toast("已下架"); renderProfilesTab();
      });
    }
    function reportCard(r) {
      const p = r.profiles;
      const target = p
        ? `<div class="q-brand">被檢舉名片：<b>${esc(p.nickname)}</b>｜${esc(p.school || "")}　<span class="tag">${p.status === "live" ? "上架中" : esc(p.status)}</span></div>
           <div class="q-section"><b>名片介紹</b><div>${esc(p.headline || "")}</div></div>`
        : `<div class="q-brand">被檢舉名片：（已不存在）</div>`;
      return `<div class="queue-card" data-id="${r.id}">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <span class="rev-type-badge">🚩 ${esc(r.reason)}</span>
        </div>
        ${target}
        ${r.content ? `<div class="q-section"><b>檢舉補充</b><div>${esc(r.content)}</div></div>` : ""}
        <div class="q-actions">
          ${p && p.status === "live" ? `<button class="btn reject" data-rmreport="${r.id}" data-pid="${esc(p.id)}">⬇️ 下架該名片＋結案</button>` : ""}
          <button class="btn approve" data-rresolve="${r.id}">✓ 結案（不下架）</button>
          <button class="btn ghost sm" data-rdismiss="${r.id}">駁回檢舉</button>
        </div>
      </div>`;
    }
    function bindReportActions() {
      document.querySelectorAll("[data-rmreport]").forEach(b => b.onclick = async () => {
        if (!confirm("下架這張名片並將檢舉結案？")) return;
        b.disabled = true;
        await DB.removeProfile(b.dataset.pid);
        await DB.resolveReport(b.dataset.rmreport, "resolved");
        toast("已下架並結案 ✓"); renderProfilesTab();
      });
      document.querySelectorAll("[data-rresolve]").forEach(b => b.onclick = async () => {
        b.disabled = true; await DB.resolveReport(b.dataset.rresolve, "resolved"); toast("已結案 ✓"); renderProfilesTab();
      });
      document.querySelectorAll("[data-rdismiss]").forEach(b => b.onclick = async () => {
        b.disabled = true; await DB.resolveReport(b.dataset.rdismiss, "dismissed"); toast("已駁回檢舉"); renderProfilesTab();
      });
    }

    // ---- 許願池 tab ----
    async function renderWishes() {
      const queue = document.getElementById("queue");
      queue.innerHTML = '<div class="admin-empty">載入中…</div>';
      let brand = [], feature = [];
      try { brand = await DB.getBrandWishes() || []; } catch (e) {}
      try { feature = await DB.getFeatureWishesAdmin() || []; } catch (e) {}
      const brandRows = brand.length
        ? brand.map((w, i) => `<tr><td>${i + 1}</td><td>${esc(w.brand_name)}${w.reason ? `<div style="color:var(--ink-soft);font-size:12.5px;margin-top:2px;">${esc(w.reason)}</div>` : ""}</td><td><b>${w.votes}</b> 票</td><td>${esc(w.anonymous ? "匿名" : (w.byName || "會員"))}</td><td><button class="mini-del" data-delbrand="${esc(w.id)}" title="刪除">🗑️</button></td></tr>`).join("")
        : `<tr><td colspan="5" style="color:var(--ink-soft);text-align:center;padding:20px;">還沒有人許願品牌</td></tr>`;
      const featureRows = feature.length
        ? feature.map((w) => `<div class="queue-card" data-id="${esc(w.id)}" style="margin-bottom:10px;">
            <div class="q-section" style="border:none;padding:0;"><div>${esc(w.content)}</div></div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
              <span style="color:var(--ink-soft);font-size:12.5px;">${esc((w.created_at || "").slice(0, 10))}</span>
              <button class="mini-del" data-delfeat="${esc(w.id)}" title="刪除">🗑️ 刪除</button>
            </div></div>`).join("")
        : `<div class="admin-empty">目前沒有功能許願</div>`;
      queue.innerHTML = `
        <h3 style="margin:8px 0 12px;">🏢 廠商許願排行（公開牆）</h3>
        <div class="queue-card" style="padding:0;overflow:hidden;">
          <table class="cmp-table" style="min-width:auto;">
            <tr><th style="width:40px;">#</th><th>品牌</th><th style="width:70px;">票數</th><th style="width:90px;">發起人</th><th style="width:44px;"></th></tr>
            ${brandRows}
          </table>
        </div>
        <h3 style="margin:28px 0 12px;">💡 功能許願（私密）</h3>
        ${featureRows}`;
      queue.querySelectorAll("[data-delbrand]").forEach(b => b.onclick = async () => {
        if (!confirm("刪除這則品牌許願？連同它的票數一起移除。")) return;
        b.disabled = true; await DB.deleteBrandWish(b.dataset.delbrand); toast("已刪除"); renderWishes();
      });
      queue.querySelectorAll("[data-delfeat]").forEach(b => b.onclick = async () => {
        if (!confirm("刪除這則功能許願？")) return;
        b.disabled = true; await DB.deleteFeatureWish(b.dataset.delfeat); toast("已刪除"); renderWishes();
      });
    }

    // ---- 活動卡 ----
    function eventCard(e) {
      const host = e.hostName || (e.hostId === "me" ? "你（本機）" : "會員");
      return `<div class="queue-card" data-id="${e.id}">
        <span class="rev-type-badge">${esc(e.type)}</span>
        <h3 style="margin-top:8px;">${esc(e.title)}</h3>
        <div class="q-brand">發起人：${esc(host)}</div>
        <div class="q-meta">
          <span class="tag">🗓️ ${esc(e.eventAt || "待定")}</span>
          <span class="tag">${e.locationType === "online" ? "線上" : "線下"}</span>
          <span class="tag">📍 ${esc(e.location || "待定")}</span>
          <span class="tag">上限 ${e.capacity || "—"}</span>
        </div>
        <div class="q-section"><b>說明</b><div>${esc(e.description || "")}</div></div>
        <div class="q-actions">
          <button class="btn approve" data-eapprove="${e.id}">✓ 通過上架</button>
          <button class="btn reject" data-ereject="${e.id}">✕ 退回</button>
        </div>
      </div>`;
    }
    function bindEventActions() {
      document.querySelectorAll("[data-eapprove]").forEach(b => b.onclick = async () => {
        b.disabled = true; await DB.approveEvent(b.dataset.eapprove); toast("活動已通過 ✓"); loadQueue();
      });
      document.querySelectorAll("[data-ereject]").forEach(b => b.onclick = async () => {
        if (!confirm("確定退回這場活動？")) return;
        b.disabled = true; await DB.rejectEvent(b.dataset.ereject); toast("已退回"); loadQueue();
      });
    }

    function bindProgramActions() {
      document.querySelectorAll("[data-approve]").forEach(b => b.onclick = async () => {
        b.disabled = true;
        await DB.approveProgram(b.dataset.approve);
        toast("已通過上架 ✓"); loadQueue();
      });
      document.querySelectorAll("[data-reject]").forEach(b => b.onclick = async () => {
        const reason = prompt("退回原因（選填，會記錄下來）：") ?? null;
        if (reason === null) return;
        b.disabled = true;
        await DB.rejectProgram(b.dataset.reject, reason);
        toast("已退回"); loadQueue();
      });
    }
    function bindReviewActions() {
      document.querySelectorAll("[data-rapprove]").forEach(b => b.onclick = async () => {
        b.disabled = true;
        await DB.approveReview(b.dataset.rapprove);
        toast("心得已通過上架 ✓"); loadQueue();
      });
      document.querySelectorAll("[data-rreject]").forEach(b => b.onclick = async () => {
        const reason = prompt("退回原因（選填）：") ?? null;
        if (reason === null) return;
        b.disabled = true;
        await DB.rejectReview(b.dataset.rreject, reason);
        toast("已退回"); loadQueue();
      });
    }

    // ---- Tabs ----
    document.querySelectorAll(".admin-tab").forEach(t => t.onclick = () => {
      tab = t.dataset.tab;
      document.querySelectorAll(".admin-tab").forEach(x => x.classList.remove("active"));
      t.classList.add("active");
      loadQueue();
    });

    // ---- 登入 gate ----
    document.getElementById("adLoginBtn").onclick = async () => {
      const email = document.getElementById("adEmail").value.trim();
      const pw = document.getElementById("adPw").value;
      const err = document.getElementById("adErr");
      err.textContent = "";
      try {
        await DB.signIn(email, pw);
        // onAuth 會處理後續
      } catch (e) {
        err.textContent = /invalid login/i.test(e.message) ? "Email 或密碼錯誤" : e.message;
      }
    };
    document.getElementById("adGoogleBtn").onclick = async () => {
      try { await DB.signInWithGoogle(); }
      catch (e) { document.getElementById("adErr").textContent = e.message || "Google 登入失敗"; }
    };
    document.getElementById("adLogout").onclick = async () => { await DB.signOut(); };

    // ---- 啟動 ----
    async function boot() {
      DB.onAuth((user) => {
        if (DB.isAdmin()) showPanel();
        else if (DB.configured) showGate(user ? "這個帳號沒有管理員權限。" : "請以管理員帳號登入後台。");
        else showPanel(); // 本機模式直接進（方便 demo）
      });
      await DB.initAuth();
    }
    boot();
  })();
  </script>
  <script src="nav.js?v=25"></script>
</body>
</html>
